address=/n8n.tu.lan/192.168.1.104
address=/affine.tu.lan/192.168.1.104
address=/pihole.tu.lan/192.168.1.104
address=/ollama.tu.lan/192.168.1.104
address=/minio.tu.lan/192.168.1.104
address=/api.minio.tu.lan/192.168.1.104
