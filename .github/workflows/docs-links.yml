name: Docs links

# Run on every push/PR to main and dev so link health is visible even when only code changes
# (Markdown in the repo is still checked against live URLs every time).
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Compare URLs often need concrete refs (would need updating each release); skip them.
      # user-attachments redirects use short-lived signed targets that can flake in CI.
      # github.token improves GitHub URL checks (rate limits / consistency).
      - name: Link checker
        uses: lycheeverse/lychee-action@v2
        with:
          token: ${{ github.token }}
          args: >-
            --verbose
            --no-progress
            --max-retries 4
            --exclude '^https://github\.com/techuties/tu-vm/compare/'
            --exclude '^https://github\.com/user-attachments/'
            README.md
            CONTRIBUTING.md
            SECURITY.md
            AGENTS.md
            CHANGELOG.md
            docs/playbooks/README.md
            suggestions/README.md
            suggestions/index.md
            suggestions/implementation-backlog.md

      - name: Job summary — files checked
        if: always()
        run: |
          {
            echo "### Markdown checked by lychee"
            echo "These paths are validated on every push to \`main\` / \`dev\` (see workflow \`docs-links.yml\`):"
            echo ""
            echo "| Path | Role |"
            echo "|------|------|"
            echo "| \`README.md\` | Project overview |"
            echo "| \`CONTRIBUTING.md\` | Contribution + GitHub checklist |"
            echo "| \`SECURITY.md\` | Security policy (Security tab → Policy) |"
            echo "| \`AGENTS.md\` | Agent / automation notes |"
            echo "| \`CHANGELOG.md\` | Release history |"
            echo "| \`docs/playbooks/README.md\` | Operator playbooks |"
            echo "| \`suggestions/README.md\` | Suggestions hub index |"
            echo "| \`suggestions/index.md\` | Suggestion map |"
            echo "| \`suggestions/implementation-backlog.md\` | Backlog |"
            echo ""
            echo "_Excluded from HTTP checks: \`/compare/\` templates and \`user-attachments\` assets (signed redirect TTL). All other links in these files are checked, including same-repo URLs._"
          } >> "$GITHUB_STEP_SUMMARY"
