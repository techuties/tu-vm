name: Trivy

on:
  push:
    branches: [main, dev]
    paths:
      - docker-compose.yml
      - .github/workflows/trivy.yml
  pull_request:
    branches: [main, dev]
    paths:
      - docker-compose.yml
      - .github/workflows/trivy.yml
  schedule:
    - cron: "0 11 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # IaC / Dockerfile misconfiguration scan (repo root). Pointing scan-ref at only
      # docker-compose.yml is not detected reliably by Trivy; '.' picks up Compose + Dockerfiles.
      # Tag must include the leading "v" (e.g. v0.35.0), not bare 0.35.0.
      - name: Trivy config (misconfig)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: "."
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
          format: table
