name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
template: |
  ## Changes

  $CHANGES
categories:
  - title: Breaking changes
    labels:
      - breaking
  - title: Features
    labels:
      - enhancement
      - feature
  - title: Fixes
    labels:
      - bug
      - fix
  - title: Documentation
    labels:
      - documentation
      - docs
  - title: Maintenance
    labels:
      - chore
      - dependencies

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - enhancement
      - feature
  default: patch

exclude-labels:
  - skip-changelog
